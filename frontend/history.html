<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizGenius AI — Quiz History</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .history-page { padding: 2.5rem 0 4rem; }
    .page-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
    .history-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .score-bar {
      height: 6px;
      border-radius: 99px;
      background: var(--border);
      width: 100px;
      overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 99px; }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state h3 { margin-bottom: 0.5rem; }
    .empty-state p { color: var(--muted); font-size:0.875rem; }
    /* Search */
    .search-row { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
    .search-row .input { max-width: 280px; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">Quiz<span>Genius</span> AI</a>
  <div class="nav-links" id="nav-user-slot"></div>
</nav>

<div class="history-page container">
  <div class="page-header">
    <div>
      <div class="label">Your learning record</div>
      <h2 class="mt-1">Quiz History</h2>
    </div>
    <div class="search-row">
      <input type="text" class="input" id="search-input" placeholder="Search quiz title…" oninput="filterRows()" />
      <a href="upload.html" class="btn btn-primary">+ New Quiz</a>
    </div>
  </div>

  <div class="history-table-wrap" id="table-wrap">
    <div class="empty-state" id="loading-state">
      <div class="spinner" style="margin:0 auto"></div>
      <p class="mt-2">Loading history…</p>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/utils.js"></script>
<script>
  renderNavUser();
  requireAuth();

  let allAttempts = [];

  async function loadHistory() {
    try {
      allAttempts = await apiFetch('/history');
      renderTable(allAttempts);
    } catch (e) {
      document.getElementById('table-wrap').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Could not load history</h3>
          <p>${e.message}</p>
        </div>`;
    }
  }

  function renderTable(data) {
    const wrap = document.getElementById('table-wrap');
    if (!data.length) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <h3>No quizzes yet</h3>
          <p>Upload a file or paste text to generate your first quiz.</p>
          <a href="upload.html" class="btn btn-primary mt-3">Generate a Quiz</a>
        </div>`;
      return;
    }

    const rows = data.map(a => {
      const pct = Math.round(a.score);
      const color = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';
      return `
        <tr data-title="${escHtml(a.quiz_title)}">
          <td>
            <div style="font-weight:600">${escHtml(a.quiz_title)}</div>
            <div class="text-muted" style="font-size:0.78rem;margin-top:0.2rem">${formatDate(a.attempted_at)}</div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <div class="score-bar">
                <div class="score-bar-fill" style="width:${pct}%;background:${color}"></div>
              </div>
              <span style="font-weight:700;color:${color}">${pct}%</span>
            </div>
          </td>
          <td><span class="text-green">✓ ${a.correct}</span></td>
          <td><span class="text-red">✗ ${a.wrong}</span></td>
          <td><span class="text-yellow">— ${a.skipped}</span></td>
          <td style="display:flex;gap:0.5rem;justify-content:flex-end;">
            <button class="btn btn-ghost btn-sm" onclick="viewResult(${a.attempt_id})">
              View →
            </button>
            <button class="btn btn-ghost btn-sm text-red" onclick="deleteAttempt(${a.attempt_id})" title="Delete history entry">
              🗑
            </button>
          </td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Quiz</th>
            <th>Score</th>
            <th>Correct</th>
            <th>Wrong</th>
            <th>Skipped</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body">${rows}</tbody>
      </table>`;
  }

  function filterRows() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allAttempts.filter(a => a.quiz_title.toLowerCase().includes(q));
    renderTable(filtered);
  }

  async function viewResult(attemptId) {
    showLoading('Loading result…');
    try {
      const result = await apiFetch('/results/' + attemptId);
      localStorage.setItem('qg_last_result', JSON.stringify(result));
      hideLoading();
      window.location.href = 'result.html';
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  }

  async function deleteAttempt(attemptId) {
    if (!confirm('Delete this quiz attempt from your history?')) return;
    showLoading('Deleting history entry…');
    try {
      await apiFetch('/history/' + attemptId, { method: 'DELETE' });
      allAttempts = allAttempts.filter(a => a.attempt_id !== attemptId);
      renderTable(allAttempts);
      hideLoading();
      showToast('History entry deleted', 'success');
    } catch (e) {
      hideLoading();
      showToast(e.message, 'error');
    }
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadHistory();
</script>
</body>
</html>
